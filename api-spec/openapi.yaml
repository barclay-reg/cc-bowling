openapi: 3.0.3
info:
  title: Bowling Game API
  description: |
    REST API for a bowling game scoring application.

    This API provides endpoints for managing a single-player bowling game session,
    including starting new games, recording roll results, and retrieving comprehensive
    game statistics. All endpoints return a unified Game structure containing
    the complete game state.

    ## Scoring Rules
    - **Frames**: A game consists of 10 frames
    - **Rolls**: Frames 1-9 have up to 2 rolls; Frame 10 has 2-3 rolls based on strikes/spares
    - **Strike**: All 10 pins on first roll; bonus = next 2 rolls
    - **Spare**: All 10 pins using 2 rolls; bonus = next 1 roll
    - **Perfect Game**: 300 points (all strikes)

    ## Response Design
    This API uses a unified response model where all endpoints return the complete Game
    structure. This simplifies the contract and ensures clients always have full game state
    information regardless of which endpoint is called.
  version: 1.0.0
  contact:
    name: Bowling Game Support
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Game Management
    description: Create and manage game sessions
  - name: Rolls
    description: Record and retrieve roll information
  - name: Game State
    description: Query game statistics and complete game state

paths:
  /games:
    post:
      summary: Start a new game
      description: |
        Initializes a new bowling game with 10 frames.
        Returns the new game state ready for the first roll.
      operationId: startNewGame
      tags:
        - Game Management
      responses:
        '201':
          description: New game successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '500':
          description: Server error while creating game
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /games/{gameId}:
    get:
      summary: Get game state by id
      description: |
        Retrieves the complete state of the specified game,
        including all frames, rolls, and calculated scores.
      operationId: getGameById
      tags:
        - Game State
      parameters:
        - name: gameId
          in: path
          required: true
          description: Unique game identifier
          schema:
            type: string
      responses:
        '200':
          description: Game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /games/{gameId}/reset:
    post:
      summary: Reset the specified game
      description: |
        Clears all game data and reinitializes the game to Frame 1, Roll 1.
        Requires confirmation to prevent accidental data loss.
      operationId: resetGame
      tags:
        - Game Management
      parameters:
        - name: gameId
          in: path
          required: true
          description: Unique game identifier
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetGameRequest'
      responses:
        '200':
          description: Game successfully reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Invalid reset request (confirmation flag not set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /games/{gameId}/frames/{frameNumber}/rolls:
    post:
      summary: Record a roll
      description: |
        Records the number of pins knocked down for the current roll.

        Validates the roll based on:
        - Current frame number
        - Previous rolls in the current frame
        - Frame type (1-9 vs. 10th frame)
        - Strike/spare status

        Returns updated game state after successful roll entry.
      operationId: recordRoll
      tags:
        - Rolls
      parameters:
        - name: gameId
          in: path
          required: true
          description: Unique game identifier
          schema:
            type: string
        - name: frameNumber
          in: path
          required: true
          description: Frame number (1-10)
          schema:
            type: integer
            minimum: 1
            maximum: 10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordRollRequest'
      responses:
        '200':
          description: Roll recorded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          description: Invalid roll data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Game or frame not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Roll cannot be recorded in current game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /games/{gameId}/frames/{frameNumber}:
    get:
      summary: Get specific frame details
      description: |
        Retrieves detailed information about a specific frame.
        Returns the single Frame.
      operationId: getFrameDetails
      tags:
        - Game State
      parameters:
        - name: gameId
          in: path
          required: true
          description: Unique game identifier
          schema:
            type: string
        - name: frameNumber
          in: path
          required: true
          description: Frame number (1-10)
          schema:
            type: integer
            minimum: 1
            maximum: 10
      responses:
        '200':
          description: Frame details and complete game state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Frame'
        '400':
          description: Invalid frame number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Game or frame not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Game:
      type: object
      description: |
        Complete game state returned by all endpoints.
        This unified response provides full context of the current game session,
        including all 10 frames with their complete state information.
      properties:
        gameId:
          type: string
          description: Unique identifier for the game session
          example: "game-2024-001"
        currentFrameNumber:
          type: integer
          minimum: 1
          maximum: 10
          description: Current frame number
        currentRollNumber:
          type: integer
          minimum: 1
          maximum: 3
          description: Current roll number within the frame
        frames:
          type: array
          items:
            $ref: '#/components/schemas/Frame'
          description: Array of all 10 frames with complete state
        totalScore:
          type: integer
          minimum: 0
          maximum: 300
          description: Total cumulative score for completed frames
        gameComplete:
          type: boolean
          description: Whether all 10 frames have been completed
        createdAt:
          type: string
          format: date-time
          description: Timestamp when game was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when game was last updated
      required:
        - gameId
        - currentFrame
        - currentRoll
        - frames
        - totalScore
        - gameComplete
        - createdAt
        - updatedAt

    Frame:
      type: object
      description: |
        A single frame within a game with complete state information.
        Includes strike/spare indicators, bonus calculations, and completion status.
      properties:
        frameNumber:
          type: integer
          minimum: 1
          maximum: 10
          description: Frame number in the game
        rolls:
          type: array
          items:
            $ref: '#/components/schemas/Roll'
          description: Rolls recorded in this frame
        strike:
          type: boolean
          description: Whether a strike was scored in this frame
        spare:
          type: boolean
          description: Whether a spare was scored in this frame
        baseScore:
          type: integer
          minimum: 0
          maximum: 10
          description: Base score (pins knocked down in frame, excluding bonus)
        bonus:
          type: integer
          minimum: 0
          maximum: 30
          description: Bonus points from strike or spare (null if pending)
          nullable: true
        frameScore:
          type: integer
          minimum: 0
          maximum: 30
          description: Total score for this frame (base + bonus, null if pending)
          nullable: true
        cumulativeScore:
          type: integer
          minimum: 0
          maximum: 300
          description: Cumulative score up to and including this frame (null if incomplete)
          nullable: true
        rollsComplete:
          type: boolean
          description: Whether all rolls for this frame have been recorded
        scorePending:
          type: boolean
          description: Whether frame has pending bonus calculation (awaiting future rolls)
        allowedRolls:
          type: integer
          minimum: 1
          maximum: 3
          description: Maximum rolls allowed in this frame (2 for frames 1-9, 3 for frame 10)
        nextExpectedRoll:
          type: integer
          minimum: 1
          maximum: 3
          description: Expected next roll number (null if frame complete or pending)
          nullable: true
      required:
        - frameNumber
        - rolls
        - strike
        - spare
        - baseScore
        - rollsComplete
        - scorePending
        - allowedRolls

    Roll:
      type: object
      description: A single roll/attempt in a frame
      properties:
        rollNumber:
          type: integer
          minimum: 1
          maximum: 3
          description: Roll number within the frame (1-3)
        pinsKnockedDown:
          type: integer
          minimum: 0
          maximum: 10
          description: Number of pins knocked down in this roll
      required:
        - rollNumber
        - pinsKnockedDown

    RecordRollRequest:
      type: object
      description: Request to record a roll
      properties:
        pinsKnockedDown:
          type: integer
          minimum: 0
          maximum: 10
          description: Number of pins knocked down (0-10)
      required:
        - pinsKnockedDown

    ResetGameRequest:
      type: object
      description: Request to reset the game
      properties:
        confirmed:
          type: boolean
          description: Confirmation flag to prevent accidental resets
      required:
        - confirmed

    Error:
      type: object
      description: Error response from API
      properties:
        error:
          type: string
          description: Error type or code
        message:
          type: string
          description: Detailed error message
        details:
          type: string
          nullable: true
          description: Additional error details or suggestions
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
      required:
        - error
        - message
        - timestamp
